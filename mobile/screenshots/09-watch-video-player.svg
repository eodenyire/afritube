<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <!-- Background -->
  <rect width="390" height="844" fill="#0f0b08" rx="40"/>

  <!-- Status bar -->
  <text x="20" y="26" fill="#f0e8d8" font-size="12" font-family="sans-serif">9:41</text>
  <text x="340" y="26" fill="#f0e8d8" font-size="12" font-family="sans-serif">●●●</text>

  <!-- Video Player (16:9 aspect ratio) -->
  <rect x="0" y="44" width="390" height="220" fill="#000000"/>
  <!-- Play button overlay -->
  <circle cx="195" cy="154" r="30" fill="rgba(232,146,10,0.2)" stroke="#e8920a" stroke-width="2"/>
  <polygon points="186,140 186,168 212,154" fill="#e8920a"/>
  <!-- Duration bar at bottom of player -->
  <rect x="0" y="250" width="390" height="4" fill="#3a3028"/>
  <rect x="0" y="250" width="130" height="4" fill="#e8920a"/>
  <circle cx="130" cy="252" r="6" fill="#e8920a"/>

  <!-- Video Info -->
  <text x="16" y="282" fill="#f0e8d8" font-size="16" font-weight="700" font-family="sans-serif">Nairobi Street Food Tour —</text>
  <text x="16" y="302" fill="#f0e8d8" font-size="16" font-weight="700" font-family="sans-serif">Hidden Gems in CBD</text>

  <!-- Meta row -->
  <text x="16" y="324" fill="#8a7a6a" font-size="13" font-family="sans-serif">1,234,567 views</text>
  <text x="130" y="324" fill="#8a7a6a" font-size="13" font-family="sans-serif">·</text>
  <text x="142" y="324" fill="#8a7a6a" font-size="13" font-family="sans-serif">Food</text>

  <!-- Action Row -->
  <line x1="16" y1="336" x2="374" y2="336" stroke="#2a2018" stroke-width="1"/>
  <line x1="16" y1="380" x2="374" y2="380" stroke="#2a2018" stroke-width="1"/>
  <!-- Like -->
  <text x="64" y="360" fill="#e05a2a" font-size="20" font-family="sans-serif" text-anchor="middle">♥</text>
  <text x="64" y="374" fill="#8a7a6a" font-size="11" font-family="sans-serif" text-anchor="middle">Like</text>
  <!-- Share -->
  <text x="168" y="360" fill="#8a7a6a" font-size="20" font-family="sans-serif" text-anchor="middle">↗</text>
  <text x="168" y="374" fill="#8a7a6a" font-size="11" font-family="sans-serif" text-anchor="middle">Share</text>
  <!-- Save -->
  <text x="272" y="360" fill="#8a7a6a" font-size="20" font-family="sans-serif" text-anchor="middle">🔖</text>
  <text x="272" y="374" fill="#8a7a6a" font-size="11" font-family="sans-serif" text-anchor="middle">Save</text>

  <!-- Creator Row -->
  <circle cx="36" cy="412" r="22" fill="#e8920a"/>
  <text x="36" y="420" fill="#0f0b08" font-size="18" font-weight="bold" font-family="sans-serif" text-anchor="middle">K</text>
  <text x="68" y="406" fill="#f0e8d8" font-size="14" font-weight="600" font-family="sans-serif">KE FoodVlogs</text>
  <text x="68" y="422" fill="#8a7a6a" font-size="12" font-family="sans-serif">45,200 subscribers</text>
  <!-- Subscribe button -->
  <rect x="292" y="398" width="82" height="30" rx="15" fill="#e8920a"/>
  <text x="333" y="418" fill="#0f0b08" font-size="12" font-weight="600" font-family="sans-serif" text-anchor="middle">Subscribe</text>

  <!-- Description box -->
  <rect x="16" y="448" width="358" height="100" rx="10" fill="#1a1410"/>
  <text x="32" y="468" fill="#8a7a6a" font-size="13" font-family="sans-serif">Join me as I explore the best street food</text>
  <text x="32" y="486" fill="#8a7a6a" font-size="13" font-family="sans-serif">spots in Nairobi's CBD. From nyama choma</text>
  <text x="32" y="504" fill="#8a7a6a" font-size="13" font-family="sans-serif">to mandazi — this city has it all!</text>

  <!-- Screen label -->
  <rect x="97" y="748" width="196" height="24" rx="6" fill="#1a1410"/>
  <text x="195" y="765" fill="#8a7a6a" font-size="11" font-family="sans-serif" text-anchor="middle">Screen 9 of 11 · Video Player</text>
</svg>
