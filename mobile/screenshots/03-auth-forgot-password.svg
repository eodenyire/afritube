<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <!-- Background -->
  <rect width="390" height="844" fill="#0f0b08" rx="40"/>

  <!-- Status bar -->
  <text x="30" y="30" fill="#f0e8d8" font-size="12" font-family="sans-serif">9:41</text>
  <text x="340" y="30" fill="#f0e8d8" font-size="12" font-family="sans-serif">●●●</text>

  <!-- Logo Row -->
  <rect x="97" y="160" width="44" height="44" rx="10" fill="#e8920a"/>
  <text x="119" y="188" fill="#0f0b08" font-size="22" font-weight="bold" font-family="sans-serif" text-anchor="middle">A</text>
  <text x="152" y="188" fill="#f0e8d8" font-size="24" font-weight="bold" font-family="sans-serif">Afri<tspan fill="#e8920a">Tube</tspan></text>

  <!-- Title -->
  <text x="97" y="240" fill="#f0e8d8" font-size="26" font-weight="bold" font-family="sans-serif">Reset password</text>
  <!-- Subtitle -->
  <text x="97" y="264" fill="#8a7a6a" font-size="14" font-family="sans-serif">We'll send you a reset link</text>

  <!-- Email input -->
  <rect x="97" y="292" width="196" height="48" rx="10" fill="#2a2018" stroke="#2a2018" stroke-width="1"/>
  <text x="113" y="321" fill="#8a7a6a" font-size="14" font-family="sans-serif">Email</text>

  <!-- Send Reset Link button -->
  <rect x="97" y="356" width="196" height="48" rx="24" fill="#e8920a"/>
  <text x="195" y="385" fill="#0f0b08" font-size="14" font-weight="bold" font-family="sans-serif" text-anchor="middle">Send Reset Link</text>

  <!-- Back to sign in -->
  <text x="195" y="440" fill="#8a7a6a" font-size="14" font-family="sans-serif" text-anchor="middle">Already have an account? <tspan fill="#e8920a">Sign in</tspan></text>

  <!-- Screen label -->
  <rect x="97" y="780" width="196" height="28" rx="6" fill="#1a1410"/>
  <text x="195" y="799" fill="#8a7a6a" font-size="12" font-family="sans-serif" text-anchor="middle">Screen 3 of 11 · Forgot Password</text>
</svg>
