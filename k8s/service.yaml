apiVersion: v1
kind: Service
metadata:
  name: afritube-service
  namespace: afritube
  labels:
    app: afritube
spec:
  selector:
    app: afritube
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
  # Change to LoadBalancer if you want a cloud load balancer directly:
  # type: LoadBalancer
