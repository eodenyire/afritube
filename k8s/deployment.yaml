apiVersion: apps/v1
kind: Deployment
metadata:
  name: afritube
  namespace: afritube
  labels:
    app: afritube
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: afritube
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: afritube
        version: "1.0"
    spec:
      containers:
        - name: afritube
          image: yourdockerhubuser/afritube:latest
          # Replace with your actual image: ghcr.io/eodenyire/afritube:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: afritube-config
            - secretRef:
                name: afritube-secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false
            readOnlyRootFilesystem: false
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
