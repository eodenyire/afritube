apiVersion: v1
kind: Secret
metadata:
  name: afritube-secrets
  namespace: afritube
  labels:
    app: afritube
type: Opaque
stringData:
  VITE_SUPABASE_PUBLISHABLE_KEY: "your-supabase-anon-key"
  # Replace with your actual Supabase anon/public key
  # To create from CLI: kubectl create secret generic afritube-secrets \
  #   --from-literal=VITE_SUPABASE_PUBLISHABLE_KEY=your-key \
  #   -n afritube
