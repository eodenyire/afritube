apiVersion: v1
kind: ConfigMap
metadata:
  name: afritube-config
  namespace: afritube
  labels:
    app: afritube
data:
  VITE_SUPABASE_URL: "https://your-project-id.supabase.co"
  VITE_SUPABASE_PROJECT_ID: "your-project-id"
