<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <!-- Background -->
  <rect width="390" height="844" fill="#0f0b08" rx="40"/>

  <!-- Status bar -->
  <text x="30" y="30" fill="#f0e8d8" font-size="12" font-family="sans-serif">9:41</text>
  <text x="340" y="30" fill="#f0e8d8" font-size="12" font-family="sans-serif">●●●</text>

  <!-- Logo Row -->
  <rect x="97" y="120" width="44" height="44" rx="10" fill="#e8920a"/>
  <text x="119" y="148" fill="#0f0b08" font-size="22" font-weight="bold" font-family="sans-serif" text-anchor="middle">A</text>
  <text x="152" y="148" fill="#f0e8d8" font-size="24" font-weight="bold" font-family="sans-serif">Afri<tspan fill="#e8920a">Tube</tspan></text>

  <!-- Title -->
  <text x="97" y="200" fill="#f0e8d8" font-size="26" font-weight="bold" font-family="sans-serif">Join AfriTube</text>
  <!-- Subtitle -->
  <text x="97" y="224" fill="#8a7a6a" font-size="14" font-family="sans-serif">Create your account</text>

  <!-- Display Name input -->
  <rect x="97" y="252" width="196" height="48" rx="10" fill="#2a2018" stroke="#2a2018" stroke-width="1"/>
  <text x="113" y="281" fill="#8a7a6a" font-size="14" font-family="sans-serif">Display name</text>

  <!-- Email input -->
  <rect x="97" y="312" width="196" height="48" rx="10" fill="#2a2018" stroke="#2a2018" stroke-width="1"/>
  <text x="113" y="341" fill="#8a7a6a" font-size="14" font-family="sans-serif">Email</text>

  <!-- Password input -->
  <rect x="97" y="372" width="196" height="48" rx="10" fill="#2a2018" stroke="#2a2018" stroke-width="1"/>
  <text x="113" y="401" fill="#8a7a6a" font-size="14" font-family="sans-serif">Password</text>

  <!-- Create Account button -->
  <rect x="97" y="436" width="196" height="48" rx="24" fill="#e8920a"/>
  <text x="195" y="465" fill="#0f0b08" font-size="15" font-weight="bold" font-family="sans-serif" text-anchor="middle">Create Account</text>

  <!-- Already have account row -->
  <text x="195" y="520" fill="#8a7a6a" font-size="14" font-family="sans-serif" text-anchor="middle">Already have an account? <tspan fill="#e8920a">Sign in</tspan></text>

  <!-- Screen label -->
  <rect x="97" y="780" width="196" height="28" rx="6" fill="#1a1410"/>
  <text x="195" y="799" fill="#8a7a6a" font-size="12" font-family="sans-serif" text-anchor="middle">Screen 2 of 11 · Sign Up</text>
</svg>
